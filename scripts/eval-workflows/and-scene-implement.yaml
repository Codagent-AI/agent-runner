name: and-scene-implement
description: "Internal eval workflow for implementing the baked and-scene task files"
hidden: true

params:
  - name: change_name
    required: true

steps:
  - id: implement-tasks
    loop:
      over: "openspec/changes/{{change_name}}/tasks/*.md"
      as: task_file
      require_matches: true
    steps:
      - id: implement-single-task
        workflow: ../../workflows/core/implement-task.yaml
        params:
          task_file: "{{task_file}}"
          run_session_report: "false"

  - id: tier1-build-and-verify
    command: |
      npm ci
      npm run build
      npm run verify
