version: 2

builds:
  - main: ./cmd/agent-runner
    binary: agent-runner
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - repository:
      owner: Codagent-AI
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/Codagent-AI/agent-runner
    description: CLI workflow orchestrator for AI agents
    license: MIT
    binaries:
      - agent-runner
    dependencies:
      - formula: agent-validator
      - formula: agent-plugin
    hooks:
      pre:
        install: |
          brew = ENV.fetch("HOMEBREW_BREW_FILE", "brew")
          ["agent-plugin", "agent-validator"].each do |formula|
            installed = system_command brew,
                                       args: ["list", "--formula", formula],
                                       must_succeed: false
            next unless installed.success?

            system_command brew, args: ["upgrade", "--formula", formula], must_succeed: false
          end
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agent-runner"]
          end
