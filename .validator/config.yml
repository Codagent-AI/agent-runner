cli:
  default_preference:
    - codex
    - github-copilot
  adapters:
    codex:
      model: gpt-5.5
      allow_tool_use: false
      thinking_budget: low
    github-copilot:
      allow_tool_use: false
      thinking_budget: low

entry_points:
  # Default: run standard checks plus reviews for code quality, security & errors
  - path: "."
    exclude:
      - .claude
      - .validator
      - openspec
    checks:
      - build:
          command: go build ./...
      - lint:
          command: golangci-lint run ./...
      - test:
          command: go test ./...
      - security-code:
          command: gosec ./...
      - security-deps:
          command: govulncheck ./...
    reviews:
      - all-reviewers:
          builtin: all-reviewers
      - task-compliance:
          builtin: task-compliance
          enabled: false # Opt-in: activate with `agent-validator run --enable-review task-compliance --context-file <task>`

  # Openspec: do not validate open or archived changes, ensure that live specs are 
  # valid even if modified manually (non-strict, allows warnings)
  - path: openspec/specs
    exclude:
      - archive
      - changes
    checks:
      - openspec-validate:
          command: openspec validate --specs --no-interactive

# -------------------------------------------------------------------
# All settings below are optional. Uncomment and change as needed.
# -------------------------------------------------------------------

# Git ref for detecting local changes via git diff (default: origin/main)

# Directory for per-job logs (default: validator_logs)
# log_dir: validator_logs

# Run gates in parallel when possible (default: true)
# allow_parallel: true

# Maximum retry attempts before declaring "Retry limit exceeded" (default: 3)
# max_retries: 3

# Archived session directories to keep during log rotation (default: 3, 0 = disable)
# max_previous_logs: 3

# Priority threshold for filtering new violations during reruns (default: medium)
# Options: critical, high, medium, low
# rerun_new_issue_threshold: medium

# Stop hook — auto-run validator when the agent stops
# Precedence: env vars > project config > global config (~/.config/agent-validator/config.yml)
# Env overrides: VALIDATOR_STOP_HOOK_ENABLED, VALIDATOR_STOP_HOOK_INTERVAL_MINUTES
# stop_hook:
#   enabled: false
#   run_interval_minutes: 5       # Minimum minutes between runs (0 = always run)

# Debug log — persistent debug logging to .debug.log
debug_log:
  enabled: false
  max_size_mb: 10               # Max size before rotation to .debug.log.1

# Structured logging via LogTape
# logging:
#   level: debug                  # Options: debug, info, warning, error
#   console:
#     enabled: true
#     format: pretty              # Options: pretty, json
#   file:
#     enabled: true
#     format: text                # Options: text, json
