name: e2e-counted-loop-exhaust
description: "E2E test: retry loop exhaustion fails workflow"
steps:
  - id: retry-loop
    loop:
      max: 3
    steps:
      - id: always-fail
        command: exit 1
        continue_on_failure: true
        break_if: success
  - id: never-reached
    command: echo "SHOULD-NOT-APPEAR"
