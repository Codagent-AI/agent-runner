name: change
description: "End-to-end change: plan then implement"

params:
  - name: change_name
    required: true

steps:
  - id: plan
    workflow: plan-change.yaml
    params:
      change_name: "{{change_name}}"

  - id: implement
    workflow: implement-change.yaml
    params:
      change_name: "{{change_name}}"
