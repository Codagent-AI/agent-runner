name: change
description: "Full plan + implement + validate + PR creation workflow. Use for normal feature development."

params:
  - name: change_name
    required: true

sessions:
  - name: lead-agent
    agent: planner

steps:
  - id: plan
    workflow: plan-change.yaml
    params:
      change_name: "{{change_name}}"

  - id: implement
    workflow: implement-change.yaml
    params:
      change_name: "{{change_name}}"
