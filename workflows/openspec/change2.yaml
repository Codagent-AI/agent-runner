name: change2
description: "Define, plan, implement, accept, archive, and finalize an OpenSpec change."

params:
  - name: change_name
    required: true

steps:
  - id: validate-feature-branch
    command: |
      current_branch=$(git branch --show-current)
      if [ -z "$current_branch" ]; then
        echo "openspec:change2 requires a named feature branch; HEAD is detached" >&2
        exit 1
      fi

      default_branch=$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name) || {
        echo "could not determine the repository's default branch" >&2
        exit 1
      }
      if [ -z "$default_branch" ]; then
        echo "repository default branch is empty" >&2
        exit 1
      fi

      if [ "$current_branch" = "$default_branch" ]; then
        echo "openspec:change2 cannot run on the default branch '$default_branch'; create or switch to a feature branch first" >&2
        exit 1
      fi

  - id: define
    workflow: define-change.yaml
    params:
      change_name: "{{change_name}}"

  - id: plan
    workflow: plan-change2.yaml
    params:
      change_name: "{{change_name}}"

  - id: implement
    workflow: implement-change2.yaml
    params:
      change_name: "{{change_name}}"

  - id: accept
    workflow: accept-change.yaml
    params:
      change_name: "{{change_name}}"

  - id: archive
    workflow: archive-change.yaml
    params:
      change_name: "{{change_name}}"

  - id: finalize
    workflow: ../core/finalize-pr.yaml
