name: plan-change
description: "Plan a flokay change: create, propose, spec, design, task-plan, and review"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

sessions:
  - name: lead-agent
    agent: planner

steps:
  - id: create
    # agent-validator detect: exit 0 = unvalidated changes present, exit 2 = clean (no changes)
    # todo move to script, add check for git porcelain
    command: |
      agent-validator detect; status=$?; if [ $status -eq 0 ]; then echo 'Unvalidated changes detected. Run agent-validator before planning.' >&2; exit 1; elif [ $status -ne 2 ]; then exit $status; fi
      openspec new change "{{change_name}}"

  - id: proposal
    session: lead-agent
    prompt: |
      Help the user write a change proposal.
      You MUST use the codagent:propose skill.

      Before doing anything else, ask the user to describe what this change is about and what they want to accomplish.
      Once the proposal document is written, continue to the next step.

  - id: specs
    session: resume
    prompt: |
      Help the user write the change spec.
      You MUST use the codagent:spec skill.
      Once all spec documents are written, continue to the next step.

  - id: design
    session: resume
    prompt: |
      Help the user design the change.
      You MUST use the codagent:design skill.
      Once the design document is written, continue to the next step.

  - id: tasks
    session: resume
    prompt: |
      Help the user plan tasks for the change.
      You MUST use the codagent:plan-tasks skill.
      Once all task documents are written, continue to the next step.

  - id: pre-review-validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports.
      Keep running the command and fixing until it passes with no errors.

      Then dry-run the delta apply: `openspec validate` does NOT verify that MODIFIED/REMOVED/RENAMED headers exist in the target main spec — that check only runs at archive time. For every delta file under `openspec/changes/{{change_name}}/specs/<capability>/spec.md`:
      - Under `## MODIFIED Requirements` and `## REMOVED Requirements`: each `### Requirement: <name>` header MUST appear verbatim (whitespace-insensitive) in `openspec/specs/<capability>/spec.md`.
      - Under `## RENAMED Requirements`: the FROM header MUST exist in the main spec.
      - If the main spec does not yet exist, only `## ADDED Requirements` is valid.
      For every mismatch, either correct the delta header to match the main spec, or restructure the delta (e.g. fold a REMOVED into a MODIFIED if the behavior is being rewritten rather than deleted). Do not proceed until every MODIFIED/REMOVED/RENAMED header resolves.

  - id: review
    mode: headless
    session: resume
    prompt: |
      You MUST use a subagent to run the codagent:review-spec skill to review the change artifacts at openspec/changes/{{change_name}}.
      Then address issues the review subagent finds.

  - id: post-review-validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports.
      Keep running the command and fixing until it passes with no errors.

      Then repeat the delta-apply dry-run from the pre-review-validate step: for every `### Requirement:` header under `## MODIFIED`, `## REMOVED`, or `## RENAMED` (FROM) sections in `openspec/changes/{{change_name}}/specs/<capability>/spec.md`, confirm the exact header exists in `openspec/specs/<capability>/spec.md`. Fix any mismatches before proceeding.

  - id: commit-openspec
    command: |
      git add openspec/changes/{{change_name}}/
      git commit -m "Add openspec documents for {{change_name}}"
      agent-validator skip
