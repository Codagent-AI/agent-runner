name: plan-change
description: "Plan a flokay change: create, propose, spec, design, task-plan, and review"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

sessions:
  - name: lead-agent
    agent: planner

steps:
  - id: create
    script: create-change.sh
    script_inputs:
      change_name: "{{change_name}}"

  - id: proposal
    session: lead-agent
    prompt: |
      Help the user write a change proposal. First, ask the user what the change is about. DO NOT attempt to guess. Then, you MUST use the codagent:propose skill. Once the proposal document is written, continue to the next step.

  - id: proposal-review
    workflow: ../core/review-proposal.yaml
    params:
      proposal_dir: "openspec/changes/{{change_name}}"

  - id: specs
    session: resume
    prompt: |
      Help the user write the change spec. You MUST use the codagent:spec skill. Once all spec documents are written, continue to the next step.

  - id: design
    session: resume
    prompt: |
      Help the user design the change. You MUST use the codagent:design skill. Once the design document is written, continue to the next step.

  - id: tasks
    session: resume
    prompt: |
      Help the user plan tasks for the change. You MUST use the codagent:plan-tasks skill. You MUST create detailed task files under openspec/changes/{{change_name}}/tasks/*.md. You MUST also create openspec/changes/{{change_name}}/tasks.md as an index that links to those task files. The implement workflow requires at least one matching tasks/*.md file. Once all task documents are written, continue to the next step.

  - id: pre-review-validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports. Keep running the command and fixing until it passes with no errors.

      Then dry-run the delta apply: `openspec validate` does NOT verify that MODIFIED/REMOVED/RENAMED headers exist in the target main spec — that check only runs at archive time. For every delta file under `openspec/changes/{{change_name}}/specs/<capability>/spec.md`:
      - Under `## MODIFIED Requirements` and `## REMOVED Requirements`: each `### Requirement: <name>` header MUST appear verbatim (whitespace-insensitive) in `openspec/specs/<capability>/spec.md`.
      - Under `## RENAMED Requirements`: the FROM header MUST exist in the main spec.
      - If the main spec does not yet exist, only `## ADDED Requirements` is valid.
      For every mismatch, either correct the delta header to match the main spec, or restructure the delta (e.g. fold a REMOVED into a MODIFIED if the behavior is being rewritten rather than deleted). Do not proceed until every MODIFIED/REMOVED/RENAMED header resolves.

  - id: review
    mode: headless
    session: resume
    prompt: |
      You MUST use a subagent to run the codagent:review-spec skill to review the change artifacts at openspec/changes/{{change_name}}. Then address issues the review subagent finds.

  - id: post-review-validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports. Keep running the command and fixing until it passes with no errors.

      Then repeat the delta-apply dry-run from the pre-review-validate step: for every `### Requirement:` header under `## MODIFIED`, `## REMOVED`, or `## RENAMED` (FROM) sections in `openspec/changes/{{change_name}}/specs/<capability>/spec.md`, confirm the exact header exists in `openspec/specs/<capability>/spec.md`. Fix any mismatches before proceeding.

  - id: commit-openspec
    command: |
      git add openspec/changes/{{change_name}}/
      git commit -m "[{{step_id}}] chore: add openspec documents for {{change_name}}"
      agent-validator skip
