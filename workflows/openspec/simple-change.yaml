name: simple-change
description: "End-to-end change with inlined planning steps (no nested plan workflow)"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: create
    script: create-change.sh
    script_inputs:
      change_name: "{{change_name}}"

  - id: plan
    agent: planner
    prompt: |
      Help the user plan the change.
      First, ask the user what the change is about. DO NOT attempt to guess.
      Then, you MUST use the codagent:simple-plan skill.

  - id: validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports.
      Keep running the command and fixing until it passes with no errors.

  - id: commit-openspec
    command: |
      git add openspec/changes/{{change_name}}/
      git commit -m "[{{step_id}}] chore: add openspec documents for {{change_name}}"
      agent-validator skip

  - id: implement-single-task
    workflow: ../core/implement-task.yaml
    params:
      task_file: "openspec/changes/{{change_name}}/tasks.md"

  - id: archive
    command: |
      openspec archive "{{change_name}}" --yes
      git add openspec
      git commit -m "[{{step_id}}] chore: archive openspec documents for {{change_name}}"
      agent-validator skip
