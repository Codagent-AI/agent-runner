name: simple-change
description: "End-to-end change with inlined planning steps (no nested plan workflow)"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: create
    # agent-validator detect: exit 0 = unvalidated changes present, exit 2 = clean (no changes)
    # todo move to script, add check for git porcelain
    command: |
      agent-validator detect; status=$?; if [ $status -eq 0 ]; then echo 'Unvalidated changes detected. Run agent-validator before planning.' >&2; exit 1; elif [ $status -ne 2 ]; then exit $status; fi
      openspec new change "{{change_name}}"

  - id: plan
    agent: planner
    prompt: |
      Help the user plan the change "{{change_name}}".
      You MUST use the codagent:simple-plan skill.

  - id: validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports.
      Keep running the command and fixing until it passes with no errors.

  - id: commit-openspec
    command: |
      git add openspec/changes/{{change_name}}/
      git commit -m "[{{step_id}}] Add openspec documents for {{change_name}}"
      agent-validator skip

  - id: implement-single-task
    workflow: ../core/implement-task.yaml
    params:
      task_file: "openspec/changes/{{change_name}}/tasks.md"

  - id: archive
    command: |
      openspec archive "{{change_name}}" --yes
      git add openspec
      git commit -m "[{{step_id}}] Archive openspec documents for {{change_name}}"
      agent-validator skip
