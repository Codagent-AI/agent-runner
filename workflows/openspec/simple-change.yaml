name: simple-change
description: "Quick plan + implement + validate workflow, okay for small changes"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: create
    script: create-change.sh
    script_inputs:
      change_name: "{{change_name}}"

  - id: plan
    agent: planner
    prompt: |
      Help the user plan the change. First, ask the user what the change is about. DO NOT attempt to guess. Then, you MUST use the codagent:simple-plan skill.

  - id: validate
    mode: autonomous
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports. Keep running the command and fixing until it passes with no errors.

  - id: check-planning-artifacts
    command: |
      missing=""
      for f in proposal.md tasks.md; do
        [ -s "openspec/changes/{{change_name}}/$f" ] || missing="$missing $f"
      done
      if [ -n "$missing" ]; then
        echo "ERROR: planning did not produce required artifacts in openspec/changes/{{change_name}}/:$missing" >&2
        echo "The plan step may have written to the wrong directory or failed silently. Re-run planning before retrying." >&2
        exit 1
      fi

  - id: commit-openspec
    command: |
      git add openspec/changes/{{change_name}}/
      git commit -m "[{{step_id}}] chore: add openspec documents for {{change_name}}"
      agent-validator skip

  - id: generate-code
    agent: implementor
    session: new
    mode: autonomous
    prompt: |
      Implement the task described in openspec/changes/{{change_name}}/tasks.md. You MUST use the codagent:implement-with-tdd skill. When you are done implementing, commit your changes following the project's commit message conventions and prepend [{{step_id}}]. Then summarize to the user what you changed.

  - id: run-validator
    workflow: ../core/run-validator.yaml
    params:
      task_file: "openspec/changes/{{change_name}}/tasks.md"
    continue_on_failure: true

  - id: archive
    command: |
      openspec archive "{{change_name}}" --yes
      git add openspec
      git commit -m "[{{step_id}}] chore: archive openspec documents for {{change_name}}"
      agent-validator skip
