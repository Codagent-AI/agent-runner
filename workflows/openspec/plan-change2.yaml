name: plan-change2
description: "Autonomously validate an approved OpenSpec definition and produce a reviewed task plan."
hidden: true

params:
  - name: change_name
    required: true

sessions:
  - name: planning-agent
    agent: planner

steps:
  - id: validate-definition
    session: planning-agent
    mode: autonomous
    capture: definition_validation
    prompt: |
      Validate the approved proposal, specifications, and design for OpenSpec change "{{change_name}}" before task planning.

      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports in the existing definition artifacts. Keep running the command and fixing until the existing artifacts pass validation. Do not create task files in this step.

      Do not treat that command alone as proof that requirements are archiveable. Run `openspec show "{{change_name}}" --json` and inspect every parsed requirement in every delta. Each requirement MUST contain at least one parsed scenario. OpenSpec can report a change as valid while parsing zero scenarios when a code fence, note, or other content separates requirement text from its `#### Scenario:` headings. Mechanically move already-approved scenario blocks into the parser-recognized position when their intended requirement is unambiguous. If a missing or detached scenario requires inventing behavior or deciding which requirement it belongs to, stop and route the change back to `define-change`.

      Limit autonomous edits to unambiguously mechanical corrections that do not change the meaning, scope, or behavior approved by the user. If resolving an issue requires changing proposal intent, requirement or scenario semantics, or a design decision, do not make that change and do not proceed to task planning. Report the exact blocker and require the interactive `define-change` workflow to run again.

      Then dry-run the delta apply because `openspec validate` does not verify that MODIFIED, REMOVED, or RENAMED headers exist in the target main spec. For every delta file under `openspec/changes/{{change_name}}/specs/<capability>/spec.md`:
      - Under `## MODIFIED Requirements` and `## REMOVED Requirements`, each `### Requirement: <name>` header MUST appear verbatim, ignoring whitespace, in `openspec/specs/<capability>/spec.md`.
      - Under `## RENAMED Requirements`, the FROM header MUST exist in the main spec.
      - If the main spec does not yet exist, only `## ADDED Requirements` is valid.

      Correct mechanical header mismatches before proceeding. If the correct resolution is semantically ambiguous, do not reinterpret the approved artifacts; stop and route the change back to `define-change`. This phase is autonomous and must not seek approval by silently choosing new semantics.

      End with the exact line `PLANNING_READY` only when validation and the delta dry-run pass without any unresolved semantic blocker. Otherwise end with `PLANNING_BLOCKED:` followed by the reason, and do not include `PLANNING_READY` anywhere in your response.

  - id: definition-status-gate
    script: planning-status-gate.sh
    script_inputs:
      report: "{{definition_validation}}"

  - id: tasks
    session: planning-agent
    mode: autonomous
    prompt: |
      Create the implementation task breakdown for OpenSpec change "{{change_name}}". Read the approved proposal, specifications, and design under `openspec/changes/{{change_name}}/`, then use the codagent:plan-tasks skill.

      This workflow intentionally makes task planning autonomous because the definition artifacts have already been approved. The workflow instruction overrides the skill's confirmation gate: do NOT ask the user to approve the number or grouping of tasks. Choose a right-sized breakdown using your best judgment and continue directly to writing the task files.

      You MUST create detailed task files under `openspec/changes/{{change_name}}/tasks/*.md` and `openspec/changes/{{change_name}}/tasks.md` as an index linking to them. The implementation workflow requires at least one matching `tasks/*.md` file.

  - id: review-plan
    workflow: review-plan.yaml
    params:
      change_name: "{{change_name}}"

  - id: post-review-validate
    session: planning-agent
    mode: autonomous
    capture: post_validation
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports. Keep running the command and fixing until it passes with no errors.

      Run `openspec show "{{change_name}}" --json` again and verify that every parsed requirement in every delta contains at least one parsed scenario. Fix only unambiguous formatting or placement problems. Treat any missing scenario semantics or ambiguous attachment as a blocker requiring `define-change`.

      Then repeat the delta-apply dry-run: for every `### Requirement:` header under `## MODIFIED`, `## REMOVED`, or `## RENAMED` FROM sections in `openspec/changes/{{change_name}}/specs/<capability>/spec.md`, confirm the exact header exists in `openspec/specs/<capability>/spec.md`. Fix every mismatch before proceeding.

      Limit autonomous edits to unambiguously mechanical corrections. Do not change approved proposal intent, requirement or scenario semantics, scope, behavior, or design decisions. If validation or the delta dry-run exposes a problem that requires such a change, leave it unresolved, stop planning, and report that the interactive `define-change` workflow must run again.

      Finally, verify that `openspec/changes/{{change_name}}/tasks.md` exists, links to every task file, and at least one non-empty file matches `openspec/changes/{{change_name}}/tasks/*.md`.

      End with the exact line `PLANNING_READY` only when all validation, delta, and task-file checks pass without an unresolved semantic blocker. Otherwise end with `PLANNING_BLOCKED:` followed by the reason, and do not include `PLANNING_READY` anywhere in your response.

  - id: post-validation-status-gate
    script: planning-status-gate.sh
    script_inputs:
      report: "{{post_validation}}"

  - id: commit-openspec
    script: commit-change-plan.sh
    script_inputs:
      change_name: "{{change_name}}"
