name: finalize-pr2
description: "Push accepted changes, mark the draft PR ready, and fix CI or review failures (max 3 cycles)."
hidden: true

sessions:
  - name: lead-agent
    agent: planner

steps:
  - id: push-pr
    session: lead-agent
    mode: autonomous
    prompt: |
      Invoke codagent:push-pr to commit any appropriate accepted or archival changes, push them, and update the existing draft pull request. Follow the project's commit message conventions and prepend [{{step_id}}] when a commit is needed.

      Keep the pull request as a draft in this step. Do not mark it ready for review yet.

  - id: mark-ready-for-review
    command: gh pr ready

  - id: ci-fix-loop
    loop:
      max: 3
    steps:
      - id: wait-ci
        session: lead-agent
        mode: autonomous
        capture: ci_report
        continue_on_failure: true
        prompt: |
          Invoke codagent:wait-ci to poll CI status and gather review comments. Treat top-level bot summaries, rate-limit notices, and already-resolved reports as informational. Report comments only when actionable unresolved review feedback remains.

      - id: ci-status-gate
        script: ci-status-gate.sh
        script_inputs:
          report: "{{ci_report}}"
        continue_on_failure: true
        break_if: success

      - id: ci-fix-needed-gate
        script: ci-fix-needed-gate.sh
        script_inputs:
          report: "{{ci_report}}"
        continue_on_failure: true

      - id: fix-pr
        session: lead-agent
        mode: autonomous
        skip_if: previous_success
        prompt: |
          CI has failures or unresolved review comments. Invoke codagent:fix-pr to address only issues that stay within the human-accepted requirements, design, and implementation scope. Follow the project's commit message conventions and prepend [{{step_id}}].

          This workflow boundary overrides any more permissive default in the skill: do not silently treat a requirement, design, or scope change as ordinary review feedback. If a requested fix would change accepted product behavior, requirements, design decisions, or materially expand scope, do not make it. Leave the finding unresolved and report that the change must return to `accept-change` (and, when needed, `define-change` or `plan-change2`) before finalization can continue.

  - id: verify-final
    session: lead-agent
    mode: autonomous
    capture: final_ci_report
    prompt: |
      Invoke codagent:wait-ci to verify the final fix cycle made CI green. Treat top-level bot summaries, rate-limit notices, and already-resolved reports as informational. Report comments only when actionable unresolved review feedback remains. Report the final status to the user.

  - id: final-ci-status-gate
    script: ci-status-gate.sh
    script_inputs:
      report: "{{final_ci_report}}"
