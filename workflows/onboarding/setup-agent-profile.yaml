name: onboarding-setup-agent-profile
description: Configure the default Agent Runner agent profiles.
steps:
  - id: detect-adapters
    script: detect-adapters.sh
    capture: detected_adapters
    capture_format: json

  - id: pick-interactive-cli
    mode: ui
    title: Interactive Agent - CLI Adapter
    body: Choose the CLI adapter for planning and conversation tasks.
    inputs:
      - kind: single-select
        id: cli
        prompt: CLI adapter
        options: ["{{detected_adapters}}"]
    actions:
      - label: Continue
        outcome: continue
    capture: interactive_choices

  - id: models-interactive
    script: models-for-cli.sh
    script_inputs:
      adapter: "{{interactive_choices.cli}}"
    capture: interactive_models
    capture_format: json

  - id: count-interactive-models
    script: count-list.sh
    script_inputs:
      items: "{{interactive_models}}"
    capture: interactive_model_count

  - id: pick-interactive-model
    mode: ui
    title: Interactive Agent - Model
    body: Choose the model for {{interactive_choices.cli}}.
    inputs:
      - kind: single-select
        id: model
        prompt: Model
        options: ["{{interactive_models}}"]
    actions:
      - label: Continue
        outcome: continue
    capture: interactive_model_choice
    skip_if: 'sh: [ {{interactive_model_count}} = 0 ]'

  - id: interactive-model-value
    script: echo-value.sh
    script_inputs:
      value: "{{interactive_model_choice.model}}"
    capture: interactive_model
    skip_if: 'sh: [ {{interactive_model_count}} = 0 ]'

  - id: interactive-model-default
    command: printf ''
    capture: interactive_model
    skip_if: 'sh: [ {{interactive_model_count}} != 0 ]'

  - id: detect-adapters-hl
    script: detect-adapters.sh
    capture: detected_adapters_hl
    capture_format: json

  - id: pick-headless-cli
    mode: ui
    title: Headless Agent - CLI Adapter
    body: Choose the CLI adapter for unattended implementation tasks.
    inputs:
      - kind: single-select
        id: cli
        prompt: CLI adapter
        options: ["{{detected_adapters_hl}}"]
    actions:
      - label: Continue
        outcome: continue
    capture: headless_choices

  - id: models-headless
    script: models-for-cli.sh
    script_inputs:
      adapter: "{{headless_choices.cli}}"
    capture: headless_models
    capture_format: json

  - id: count-headless-models
    script: count-list.sh
    script_inputs:
      items: "{{headless_models}}"
    capture: headless_model_count

  - id: pick-headless-model
    mode: ui
    title: Headless Agent - Model
    body: Choose the model for {{headless_choices.cli}}.
    inputs:
      - kind: single-select
        id: model
        prompt: Model
        options: ["{{headless_models}}"]
    actions:
      - label: Continue
        outcome: continue
    capture: headless_model_choice
    skip_if: 'sh: [ {{headless_model_count}} = 0 ]'

  - id: headless-model-value
    script: echo-value.sh
    script_inputs:
      value: "{{headless_model_choice.model}}"
    capture: headless_model
    skip_if: 'sh: [ {{headless_model_count}} = 0 ]'

  - id: headless-model-default
    command: printf ''
    capture: headless_model
    skip_if: 'sh: [ {{headless_model_count}} != 0 ]'

  - id: pick-scope
    mode: ui
    title: Config Scope
    body: Choose where the profile should be saved.
    inputs:
      - kind: single-select
        id: scope
        prompt: Scope
        options: ["global", "project"]
    actions:
      - label: Continue
        outcome: continue
    capture: scope_choice

  - id: resolve-target-path
    command: 'case "{{scope_choice.scope}}" in global) printf "%s/.agent-runner/config.yaml" "$HOME" ;; project) printf "%s/.agent-runner/config.yaml" "$PWD" ;; *) exit 1 ;; esac'
    capture: target_path

  - id: check-collisions
    script: check-collisions.sh
    script_inputs:
      target_path: "{{target_path}}"
    capture: collisions
    capture_format: json

  - id: count-collisions
    script: count-list.sh
    script_inputs:
      items: "{{collisions}}"
    capture: collision_count

  - id: overwrite-default
    command: printf overwrite
    capture: overwrite_action
    skip_if: 'sh: [ {{collision_count}} != 0 ]'

  - id: format-collisions
    script: format-list.sh
    script_inputs:
      items: "{{collisions}}"
    capture: collisions_text
    skip_if: 'sh: [ {{collision_count}} = 0 ]'

  - id: confirm-overwrite
    mode: ui
    title: Existing Agent Profiles
    body: "These entries already exist and will be replaced: {{collisions_text}}"
    actions:
      - label: Overwrite
        outcome: overwrite
      - label: Cancel
        outcome: cancel
    outcome_capture: overwrite_action
    skip_if: 'sh: [ {{collision_count}} = 0 ]'

  - id: fail-overwrite-cancel
    command: exit 1
    skip_if: 'sh: [ {{overwrite_action}} != cancel ]'

  - id: confirm
    mode: ui
    title: Confirm Agent Profile
    body: |
      The following will be written to {{target_path}}:

      interactive_base: {{interactive_choices.cli}} / {{interactive_model}}
      headless_base: {{headless_choices.cli}} / {{headless_model}}
      planner: extends interactive_base
      implementor: extends headless_base
    actions:
      - label: Confirm
        outcome: confirm
      - label: Cancel
        outcome: cancel
    outcome_capture: confirm_action
    skip_if: 'sh: [ {{overwrite_action}} = cancel ]'

  - id: fail-confirm-cancel
    command: exit 1
    skip_if: 'sh: [ {{confirm_action}} != cancel ]'

  - id: write-profile
    script: write-profile.sh
    script_inputs:
      interactive_cli: "{{interactive_choices.cli}}"
      interactive_model: "{{interactive_model}}"
      headless_cli: "{{headless_choices.cli}}"
      headless_model: "{{headless_model}}"
      target_path: "{{target_path}}"
    skip_if: 'sh: [ {{confirm_action}} != confirm ]'
