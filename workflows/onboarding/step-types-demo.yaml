name: onboarding-step-types-demo
description: Demonstrates Agent Runner workflow step types during onboarding.
steps:
  - id: intro-ui
    mode: ui
    title: Live Workflow Demo
    body: |
      You're looking at a live Agent Runner workflow. The left pane lists its
      steps; the right pane (here) shows detail for the selected step.

      Try navigating now:
        ↑/↓  move between steps
        d    drill into a sub-workflow
        j/k  scroll this pane
        ←/→  move between buttons
        enter  select a button

      Each step has a type. This demo walks through the main ones:
        UI       — static content with actions (like this step)
        Agent    — interactive or headless AI sessions
        Shell    — deterministic local commands
        Capture  — saves a value for later steps to reference

      Press Continue to start.
    actions:
      - label: Continue
        outcome: continue

  - id: explain-interactive
    mode: ui
    title: Interactive Agent Step
    body: |
      Interactive steps open a live agent session where you and the agent collaborate before the workflow moves on.

      Example: a planning step that opens an interactive session so you can discuss and shape the plan together before moving to a headless implementation step.

      The next step opens a short interactive session. Ask it anything
      about Agent Runner. When you're done, continue in any of these ways:
        - Tell the agent to continue
        - Type /next
        - Press Ctrl-]
    actions:
      - label: Continue
        outcome: continue

  - id: interactive-qa
    agent: planner
    mode: interactive
    session: new
    prompt: |
      You are demonstrating an Agent Runner interactive step during onboarding.

      Explain that the user can advance the workflow to the next step through the normal continue control after this short exchange. Answer lightweight Agent Runner questions using the packaged documentation at {{session_dir}}/bundled/onboarding/docs/.

      Keep the exchange brief. When the user's question has been answered or they indicate they are ready, complete the step so the workflow can continue.

      Do not write files, modify configuration, start services, install dependencies, or change project state.

  - id: back-in-workflow
    mode: ui
    title: Back In The Workflow
    body: |
      That was an interactive agent step. It took over the screen while you
      and the agent exchanged messages.

      When the step finished, Agent Runner brought you back here. Depending
      on what comes next in the workflow, the next step might open another
      interactive agent session or it might come back to this TUI — like right now.
    actions:
      - label: Continue
        outcome: continue

  - id: explain-headless
    mode: ui
    title: Headless Agent Step
    body: |
      Headless steps give an agent a task and run it to completion without interaction. The workflow advances automatically when the agent finishes.

      Example: an implementation step that takes a task file and writes the code while you watch progress stream to the terminal.

      The next step runs a short headless task. Watch the output, then the workflow will continue on its own.
    actions:
      - label: Continue
        outcome: continue

  - id: headless-demo
    agent: implementor
    mode: headless
    session: new
    prompt: |
      You are demonstrating an Agent Runner headless step during onboarding.

      Return a concise explanation of when a workflow should use a headless agent step instead of an interactive agent step.

      Do not write files, modify configuration, run shell commands, start services, install dependencies, call external services, or change project state.

  - id: review-headless
    mode: ui
    title: Headless Step Complete
    body: |
      The headless step ran and the workflow moved on automatically. Drill into this sub-workflow and then use the arrows to select the headless step and see what the agent wrote. Then press l to come back to this screen.
    actions:
      - label: Continue
        outcome: continue

  - id: explain-shell
    mode: ui
    title: Shell Step And Capture
    body: |
      Shell steps run a local command directly — no agent involved. They're useful for deterministic operations like git commits, validation checks, or scaffolding.

      Shell steps can also capture their output into a workflow variable that later steps reference. The next step runs a command and captures its output as shell_capture.
    actions:
      - label: Continue
        outcome: continue

  - id: shell-capture
    command: printf '%s\n' agent-runner-demo-capture
    capture: shell_capture

  - id: summary
    mode: ui
    title: Step Types Demo Complete
    body: |
      The shell step captured this value: {{shell_capture}}

      This step is reading that captured value using interpolation — {{shell_capture}} in the workflow YAML was replaced with the shell step's output. This is how steps pass data forward.

      That covers the main step types: UI, interactive agent, headless agent, shell, and capture.
    actions:
      - label: Continue
        outcome: continue
      - label: Learn more
        outcome: learn_more
    outcome_capture: summary_action

  - id: learn-more-qa
    agent: planner
    mode: interactive
    session: new
    prompt: |
      You are providing one additional Agent Runner Q&A exchange after the onboarding step types summary.

      Use the packaged documentation at {{session_dir}}/bundled/onboarding/docs/ for reference. Answer one or two lightweight Agent Runner questions, then complete the step so the demo workflow can finish.

      Do not write files, modify configuration, start services, install dependencies, or change project state.
    skip_if: 'sh: [ "x{{summary_action}}" != "xlearn_more" ]'
