name: simple-change
description: "End-to-end change with inlined planning (no nested plan workflow, no openspec dependency)"

sessions:
  - name: lead-agent
    agent: planner

steps:
  - id: guard-clean-tree
    # agent-validator detect: exit 0 = unvalidated changes present, exit 2 = clean (no changes)
    command: |
      agent-validator detect; status=$?; if [ $status -eq 0 ]; then echo 'Unvalidated changes detected. Run agent-validator before planning.' >&2; exit 1; elif [ $status -ne 2 ]; then exit $status; fi

  - id: plan
    session: lead-agent
    prompt: |
      Help the user plan the change.
      First, ask the user what the change is about. DO NOT attempt to guess.
      Then, you MUST use the codagent:simple-plan skill.

  - id: locate-task
    session: lead-agent
    mode: headless
    capture: task_file
    prompt: |
      You just planned a simple change that produced a single task file.
      Output the path to that task file on a single line with NO other text,
      NO markdown fences, and NO explanation.

      Example valid output: some/path/tasks/001-do-the-thing.md

  - id: generate-code
    session: lead-agent
    mode: headless
    prompt: |
      Implement the task described in {{task_file}}.
      You MUST use the codagent:implement-with-tdd skill.
      When you are done implementing, commit your changes following the project's
      commit message conventions and prepend [{{step_id}}]. Then summarize to the user what you changed.

  - id: run-validator
    workflow: ../core/run-validator.yaml

  - id: check-clean
    command: test -z "$(git status --porcelain)"
    continue_on_failure: true

  - id: commit-leftovers-if-needed
    session: lead-agent
    mode: headless
    prompt: |
      There are uncommitted changes leftover after implementing the task described in {{task_file}}.
      Run git status and git diff to review them. Only stage and commit files
      that are related to this task and appropriate to check into git — ignore
      unrelated changes, generated artifacts, or files that should be gitignored.
      Follow the project's commit message conventions and prepend [{{step_id}}].
      Summarize which files you committed and which you left out, and why.
    skip_if: previous_success
