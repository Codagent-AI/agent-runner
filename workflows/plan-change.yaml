name: plan-change
description: "Plan a flokay change: create, propose, spec, design, task-plan, and review"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: check-clean
    mode: shell
    # agent-validator detect: exit 0 = unvalidated changes present, exit 2 = clean (no changes)
    command: "agent-validator detect; status=$?; if [ $status -eq 2 ]; then exit 0; elif [ $status -eq 0 ]; then echo 'Unvalidated changes detected. Run agent-validator before planning.' >&2; exit 1; else exit $status; fi"

  - id: create
    mode: shell
    command: openspec new change "{{change_name}}"

  - id: proposal
    mode: interactive
    session: resume
    prompt: |
      Help the user write a change proposal.
      You MUST use the codagent:propose skill.

      Before doing anything else, ask the user to describe what this change is about and what they want to accomplish.
      Once the proposal document is written, signal completion to exit this step.

  - id: specs
    mode: interactive
    session: resume
    prompt: |
      Help the user write the change spec.
      You MUST use the codagent:spec skill.
      Once all spec documents are written, signal completion to exit this step.

  - id: design
    mode: interactive
    session: resume
    prompt: |
      Help the user design the change.
      You MUST use the codagent:design skill.
      Once the design document is written, signal completion to exit this step.

  - id: tasks
    mode: interactive
    session: resume
    prompt: |
      Help the user plan tasks for the change.
      You MUST use the codagent:plan-tasks skill.
      Once all task documents are written, signal completion to exit this step.

  - id: pre-review-validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports.
      Keep running the command and fixing until it passes with no errors.

  - id: review
    mode: headless
    session: resume
    prompt: |
      You MUST use a subagent to run the codagent:review-spec skill to review the change artifacts at openspec/changes/{{change_name}}.
      Then address issues the review subagent finds.

  - id: post-review-validate
    mode: headless
    session: resume
    prompt: |
      Run `openspec validate --type change "{{change_name}}"` and fix every issue it reports.
      Keep running the command and fixing until it passes with no errors.

  - id: skip-validator
    mode: shell
    command: agent-validator skip
