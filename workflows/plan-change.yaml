name: plan-change
description: "Plan a flokay change: create, propose, spec, design, task-plan, and review"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: create
    mode: shell
    command: openspec new change "{{change_name}}"

  - id: proposal
    mode: interactive
    session: resume
    prompt: |
      Help me write a change proposal.
      You MUST use the codagent:propose skill.

      Before doing anything else, ask me to describe what this change is about and what I want to accomplish.

  - id: specs
    mode: interactive
    session: resume
    prompt: |
      Help me write the change spec.
      You MUST use the codagent:spec skill.

  - id: design
    mode: interactive
    session: resume
    prompt: |
      Help me design the change.
      You MUST use the codagent:design skill.

  - id: tasks
    mode: interactive
    session: resume
    prompt: |
      Help me plan tasks for the change.
      You MUST use the codagent:plan-tasks skill.

  - id: pre-review-validate
    workflow: validate-change.yaml

  - id: review
    mode: interactive
    session: new
    prompt: |
      Review the OpenSpec change artifacts at: openspec/changes/{{change_name}}
      You MUST use the codagent:review-spec skill.
      Fix any issues you find. You may ask the user questions if needed.

  - id: post-review-validate
    workflow: validate-change.yaml
