name: implement-task
description: "Implement a single task: agent step then validator retry"

params:
  - name: task_file
    required: true

steps:
  - id: implement
    agent: implementor
    session: new
    prompt: |
      Implement the task described in {{task_file}}.

      When you are done implementing, commit your changes with a clear,
      descriptive commit message. Then summarize to the user what you changed.

  - id: simplify
    session: resume
    prompt: |
      If the /simplify skill is available, run it focusing on code reuse and readability.
      If it is not available, review your git diff for duplicated logic that should be
      extracted into shared helpers, and readability issues like deep nesting, unclear
      naming, or overly complex conditionals. Fix and commit anything clear-cut.

  - id: run-validator
    workflow: run-validator.yaml

  - id: check-clean
    command: test -z "$(git status --porcelain)"
    continue_on_failure: true

  - id: commit-leftovers-if-needed
    session: resume
    prompt: |
      There are uncommitted changes leftover after implementing the task described in {{task_file}}.
      Run git status and git diff to review them. Only stage and commit files
      that are related to this task and appropriate to check into git — ignore
      unrelated changes, generated artifacts, or files that should be gitignored.
      Summarize which files you committed and which you left out, and why.
    skip_if: previous_success

  - id: session-report
    session: resume
    prompt: |
      Run the codagent:session-report skill against the task file {{task_file}}.
