name: validate-change
description: "Retry loop: validate OpenSpec change artifacts, fix on failure, max 3 attempts"

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: validate-loop
    loop:
      max: 3
    steps:
      - id: validate
        mode: shell
        command: openspec validate --change "{{change_name}}"
        capture: validate_output
        continue_on_failure: true
        break_if: success

      - id: fix-validation
        mode: interactive
        session: resume
        prompt: |
          openspec validate found issues with the change artifacts. Fix them.

          {{validate_output}}
