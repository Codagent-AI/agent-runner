name: smoke-test
description: "Manual smoke test for core step types (agent, shell, loop, capture, session resume, skip_if, break_if)"

sessions:
  - name: tester
    agent: haiku_tester

steps:
  - id: shell-capture
    command: echo "smoke-test value"
    capture: greeting

  - id: agent-named
    session: tester
    prompt: "Reply with one short sentence echoing this value back to me: {{greeting}}"

  - id: agent-resume
    session: resume
    prompt: "In one short sentence, what value did I just send you?"

  - id: shell-fail
    command: exit 1
    continue_on_failure: true

  - id: agent-after-fail
    session: resume
    mode: interactive
    prompt: "The previous shell step failed on purpose. Acknowledge in one short sentence and then ask me if I'm done."
    skip_if: previous_success

  - id: counted-loop
    loop:
      max: 3
      as_index: i
    steps:
      - id: loop-body
        command: echo "iteration {{i}}"
