version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocognit
    - funlen
    - cyclop
    - gocritic
    - revive
    - misspell
    - unconvert
    - nolintlint

  settings:
    gocognit:
      min-complexity: 35

    funlen:
      lines: 100
      statements: 60

    cyclop:
      max-complexity: 35

    revive:
      rules:
        - name: blank-imports
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: var-naming

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
          - funlen
          - errcheck
      - path: cmd/pty-poc/
        linters:
          - errcheck
          - funlen
          - gocognit
          - cyclop
          - revive
          - gocritic
      - path: cmd/agent-runner/
        linters:
          - revive
          - funlen
      - path: _test\.go
        linters:
          - revive
        text: unused-parameter

formatters:
  enable:
    - goimports
