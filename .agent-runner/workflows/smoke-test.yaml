name: smoke-test
description: "Manual smoke test for core step types (agent, shell, loop, capture, session resume, skip_if, break_if)"

sessions:
  - name: claude-headless
    agent: claude_headless_smoke

steps:
  - id: shell-capture
    command: echo "smoke-test value"
    capture: greeting
  - id: claude-call-agent
    agent: claude_headless_smoke
    session: new
    prompt: |
      Use call_agent exactly once with session `claude-headless` and ask it to remember the value `{{greeting}}`.
      Return the called agent's response in one short sentence.

  - id: claude-named-reuse
    session: claude-headless
    prompt: "Reply with one short sentence stating the value you were asked to remember in the call that created this named session."

  - id: claude-agent-steps
    workflow: smoke-test-agent-steps.yaml

  - id: interactive-shell
    mode: interactive
    command: |
      printf "What's your favorite color? "
      read color
      echo "Nice choice — $color it is."

  - id: counted-loop
    loop:
      max: 3
      as_index: i
    steps:
      - id: loop-body
        command: echo "iteration {{i}}"
