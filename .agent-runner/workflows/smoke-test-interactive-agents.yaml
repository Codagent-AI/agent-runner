name: smoke-test-interactive-agents
description: "Manual smoke test for interactive agent adapters"

steps:
  - id: claude-interactive
    agent: planner
    session: new
    mode: interactive
    cli: claude
    model: haiku
    prompt: "Reply with exactly this short sentence: claude interactive smoke ready. Then wait for me to continue."

  - id: claude-interactive-resume
    session: resume
    mode: interactive
    cli: claude
    model: haiku
    prompt: "Confirm you remember saying claude interactive smoke ready, then reply with exactly this short sentence: claude interactive resume ready. Then wait for me to continue."

  - id: codex-interactive
    agent: planner
    session: new
    mode: interactive
    cli: codex
    model: gpt-5.4-mini
    prompt: "Reply with exactly this short sentence: codex interactive smoke ready. Then wait for me to continue."

